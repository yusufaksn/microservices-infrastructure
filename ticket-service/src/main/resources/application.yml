server:
  port: 8502

spring:
  application:
    name: ticket-service

  datasource:
    url: jdbc:postgresql://localhost:5434/ticketdb
    username: user
    password: password
    driver-class-name: org.postgresql.Driver

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/master

jdbc:
  datasource-proxy:
    enabled: true

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans