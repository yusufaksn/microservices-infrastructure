server:
  port: 8502

spring:
  application:
    name: ticket-service

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://host.minikube.internal:8080/realms/master

  datasource:
    url: jdbc:mysql://host.minikube.internal:3306/testdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: user
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver

  rabbitmq:
    host: host.docker.internal
    port: 5672
    username: admin
    password: admin123

management:
  tracing:
    sampling:
      probability: 1.0
    propagation:
      produce: [W3C, B3]
      consume: [W3C, B3]
  zipkin:
    tracing:
      endpoint: http://10.0.2.2:9411/api/v2/spans

  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

  endpoints:
    web:
      exposure:
        include: "health,info,tracing"

logging:
  level:
    org.springframework.security: TRACE
    org.springframework.security.oauth2: TRACE