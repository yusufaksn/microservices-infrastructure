apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticket-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ticket-service
  template:
    metadata:
      labels:
        app: ticket-service
    spec:
      containers:
        - name: ticket-service-container
          # 🔴 DEĞİŞEN SATIR: Minikube listesindeki tam ismi verdik
          image: docker.io/library/ticket-service:v10
          # 💡 İPUCU: İmaj lokalde zaten var olduğu için 'Always' yerine 'IfNotPresent' yaparsak
          # Kubernetes dışarıdan (internet üzerinden) çekmeye çalışmaz, direkt lokaldekini kullanır.
          imagePullPolicy: IfNotPresent 
          ports:
            - containerPort: 8502
          envFrom:
            - configMapRef:
                name: ticket-service-config
            - secretRef:
                name: ticket-service-secret
          env:
            - name: SERVER_PORT
              value: "8502"