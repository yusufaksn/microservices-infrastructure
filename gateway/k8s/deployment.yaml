apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-app
  template:
    metadata:
      labels:
        app: gateway-app
    spec:
      containers:
      - name: gateway-container
        image: gateway-service:v6
        imagePullPolicy: Never
        ports:
        - containerPort: 8504

        envFrom:
        - configMapRef:
            name: gateway-config